# Project-wide Gradle settings.

# Increased memory and stack size for the Gradle daemon.
# -Xss4m is critical for Kotlin 2.1.0 to handle large icon libraries.
org.gradle.jvmargs=-Xmx4096m -Xss4m -XX:MaxMetaspaceSize=1024m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# Explicitly configure the Kotlin daemon with high memory and stack size.
kotlin.daemon.jvmargs=-Xmx4096m -Xss4m -XX:MaxMetaspaceSize=512m

# Strategy 'out-of-process' is often more stable if the daemon keeps crashing with 'null'.
# If builds are too slow, you can try changing this back to 'daemon' after the first successful build.
kotlin.compiler.execution.strategy=out-of-process

# Enable parallel execution and caching
org.gradle.parallel=true
org.gradle.caching=true

# Kotlin code style
kotlin.code.style=official

# AndroidX settings
android.useAndroidX=true
android.enableJetifier=false

# Optimization
android.nonTransitiveRClass=true
android.dependency.excludeLibraryComponentsFromConstraints=true
